<!-- base.html — Base layout template
     Replaces: The <head> + DaisyUI/HTMX setup from ALL .templ files
     
     The original study-llama included these CDN scripts in EVERY template.
     Jinja2 template inheritance lets us define them once here. -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Study Llama{% endblock %} — OpenFrontier</title>
    
    <!-- HTMX — Dynamic interactions without writing JavaScript
         This is the same library the original study-llama used! -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js"></script>
    
    <!-- DaisyUI + Tailwind — Beautiful UI components via CDN
         Same as the original: DaisyUI v5 + Tailwind Browser -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Alpine.js — Lightweight reactivity for dropdowns, modals, etc. -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        /* Custom styles to enhance the DaisyUI theme */
        .hero-gradient {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            transition: transform 0.2s ease;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-base-200">
    {% include "partials/navbar.html" %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    {% include "partials/footer.html" %}
</body>
</html>
