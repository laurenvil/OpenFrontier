<!-- login.html — Sign in page
     Replaces: frontend/templates/signin.templ -->
{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="card bg-base-100 shadow-xl w-full max-w-md">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center">🔑 Sign In</h2>
            <p class="text-center text-sm opacity-60 mb-4">
                Access your Study Llama notes
            </p>
            
            <!-- HTMX form — submits without page reload -->
            <form hx-post="/login"
                  hx-target="#status"
                  hx-swap="innerHTML">
                
                <div id="status"></div>
                
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">Username</span></label>
                    <input type="text" name="username" placeholder="Enter your username"
                           class="input input-bordered w-full" required />
                </div>
                
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text">Password</span></label>
                    <input type="password" name="password" placeholder="Enter your password"
                           class="input input-bordered w-full" required />
                </div>
                
                <div class="form-control">
                    <button type="submit" class="btn btn-primary w-full">
                        Sign In
                    </button>
                </div>
            </form>
            
            <p class="text-center mt-4 text-sm">
                Don't have an account?
                <a href="/signup" class="link link-primary">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
