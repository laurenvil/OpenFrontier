<!-- navbar.html — Navigation bar partial
     Replaces: frontend/templates/navbar.templ -->
<div class="navbar bg-base-100 shadow-lg px-4">
    <div class="flex-1">
        <a href="/" class="btn btn-ghost text-xl font-bold">
            🦙 Study Llama
        </a>
    </div>
    <div class="flex-none">
        <ul class="menu menu-horizontal px-1 gap-1">
            {% if authenticated %}
                <li><a href="/categories" class="btn btn-ghost btn-sm">📂 Categories</a></li>
                <li><a href="/notes" class="btn btn-ghost btn-sm">📝 Notes</a></li>
                <li><a href="/search" class="btn btn-ghost btn-sm">🔍 Search</a></li>
                <li>
                    <button hx-post="/logout"
                            hx-swap="none"
                            class="btn btn-outline btn-sm btn-error">
                        Logout
                    </button>
                </li>
            {% else %}
                <li><a href="/login" class="btn btn-ghost btn-sm">Sign In</a></li>
                <li><a href="/signup" class="btn btn-primary btn-sm">Sign Up</a></li>
            {% endif %}
        </ul>
    </div>
</div>
